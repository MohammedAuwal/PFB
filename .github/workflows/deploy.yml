name: Build and Deploy Flutter Web

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Enable Flutter Web
        run: flutter config --enable-web

      - name: Generate web folder (if missing)
        run: |
          set -euo pipefail
          if [ ! -d "web" ] || [ ! -f "web/index.html" ]; then
            rm -rf tmp_web web
            flutter create --platforms web --project-name pfb tmp_web
            mv tmp_web/web ./web
            rm -rf tmp_web
          fi

      # IMPORTANT: make sure assets referenced in pubspec.yaml exist
      - name: Ensure required assets exist
        run: |
          set -euo pipefail
          mkdir -p assets
          mkdir -p assets/images

          # If icon.png is not committed, download it (same as Android workflow)
          if [ ! -f assets/icon.png ]; then
            echo "assets/icon.png missing. Downloading..."
            GDRIVE_FILE_ID="1zJ3CQ8PrTaYs5Z4feJV2D6PL3t4CK3vx"
            curl -L "https://drive.google.com/uc?export=download&id=${GDRIVE_FILE_ID}" -o assets/icon.png
          fi

          # Ensure icon_foreground exists too
          if [ ! -f assets/icon_foreground.png ]; then
            cp assets/icon.png assets/icon_foreground.png
          fi

          ls -la assets || true

      - name: Clean previous build
        run: flutter clean

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      # ── Cache-bust: guarantees at least index.html has a unique hash ──
      # ── on every run, even if the Dart source hasn't changed.         ──
      - name: Inject build fingerprint
        run: |
          set -euo pipefail
          FINGERPRINT="pfb-${{ github.run_number }}-$(date +%s)"

          # 1) Write a version file
          printf '%s\n' "$FINGERPRINT" > build/web/version.txt

          # 2) Inject a unique HTML comment into <head> — this is the
          #    reliable cache-buster because index.html is always deployed
          #    and sed modifies it in-place.
          sed -i "s|</head>|  <!-- $FINGERPRINT -->\n</head>|" build/web/index.html

          # 3) Verify injection worked
          echo "=== version.txt ==="
          cat build/web/version.txt
          echo ""
          echo "=== Cache-bust comment in index.html ==="
          grep -o '<!-- pfb-[^ ]* -->' build/web/index.html || echo "⚠️  Comment NOT found in index.html"
          echo ""
          echo "=== Key file hashes ==="
          sha256sum build/web/main.dart.js build/web/index.html build/web/version.txt

      # ── Deploy ──────────────────────────────────────────────────────────
      #  Firebase Hosting returns HTTP 400 "current active version" when
      #  you try to release a version that is already live.  This happens
      #  when a previous deploy's release step succeeded but the CLI
      #  missed the success response (network timeout / premature close).
      #  We capture the output and treat this specific error as success.
      - name: Deploy to Firebase Hosting
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          # ── Authenticate ───────────────────────────────────────────────
          printf '%s' "$SA_JSON" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"

          # ── Deploy ─────────────────────────────────────────────────────
          npx firebase-tools@latest deploy \
            --only hosting \
            --project phlakesfabric \
            > /tmp/deploy.log 2>&1 || true

          # ── Show output ────────────────────────────────────────────────
          cat /tmp/deploy.log

          # ── Cleanup credentials ────────────────────────────────────────
          rm -f "$RUNNER_TEMP/firebase-sa.json"

          # ── Interpret result ───────────────────────────────────────────
          if grep -q "current active version" /tmp/deploy.log; then
            echo ""
            echo "✅ Site is already serving this exact version."
            echo "   (A previous deploy succeeded; this error is harmless.)"
            exit 0
          fi

          if grep -qi "deploy complete\|version released\|Project Console" /tmp/deploy.log; then
            echo ""
            echo "✅ Deploy succeeded!"
            exit 0
          fi

          echo ""
          echo "❌ Deploy failed with an unexpected error."
          exit 1