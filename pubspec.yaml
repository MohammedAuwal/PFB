name: pfb
description: ismailTex App
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^17.2.3
  google_sign_in: ^6.2.2
  google_fonts: ^6.2.1
  cloud_firestore: ^5.4.4
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  min_sdk_android: 26

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon.png
    - assets/icon_foreground.png
