name: Build and Deploy Flutter Web

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Enable Flutter Web
        run: flutter config --enable-web

      - name: Generate web folder (if missing)
        run: |
          set -euo pipefail
          if [ ! -d "web" ] || [ ! -f "web/index.html" ]; then
            rm -rf tmp_web web
            flutter create --platforms web --project-name pfb tmp_web
            mv tmp_web/web ./web
            rm -rf tmp_web
          fi

      # IMPORTANT: make sure assets referenced in pubspec.yaml exist
      - name: Ensure required assets exist
        run: |
          set -euo pipefail
          mkdir -p assets
          mkdir -p assets/images

          # If icon.png is not committed, download it (same as Android workflow)
          if [ ! -f assets/icon.png ]; then
            echo "assets/icon.png missing. Downloading..."
            GDRIVE_FILE_ID="1zJ3CQ8PrTaYs5Z4feJV2D6PL3t4CK3vx"
            curl -L "https://drive.google.com/uc?export=download&id=${GDRIVE_FILE_ID}" -o assets/icon.png
          fi

          # Ensure icon_foreground exists too
          if [ ! -f assets/icon_foreground.png ]; then
            cp assets/icon.png assets/icon_foreground.png
          fi

          ls -la assets || true

      - name: Clean previous build
        run: flutter clean

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      # ── Cache-bust: ensures every deploy has a unique file ──────────────
      - name: Inject build version
        run: |
          BUILD_VERSION="build-${{ github.run_number }}-$(date +%s)"
          echo "$BUILD_VERSION" > build/web/version.txt
          echo "✅ Injected $BUILD_VERSION into build/web/version.txt"

      # ── Deploy directly with firebase-tools (avoids action-hosting-deploy ──
      # ── bug that falsely reports "current active version" on live channel) ──
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Write service account credentials to a temp file
          printenv FIREBASE_SERVICE_ACCOUNT_JSON > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"

          # Deploy
          npx firebase-tools@latest deploy --only hosting --project phlakesfabric

          # Cleanup credentials
          rm -f "$RUNNER_TEMP/firebase-sa.json"