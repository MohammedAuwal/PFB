name: Android Build & Release (Flutter APK)
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
# ── Grant GITHUB_TOKEN the permissions it needs ──────────────────────────────
permissions:
  contents: write   # ← required to create releases and upload assets
  actions: read
  checks: read
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      KEYSTORE_PATH: android/app/upload-keystore.jks
    steps:
      - uses: actions/checkout@v4
      # ================================================================
      # STEP 1: Deploy Firestore Indexes
      # ================================================================
      - name: Deploy Firestore Indexes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npm install -g firebase-tools
          firebase deploy --only firestore:indexes --token "${{ secrets.FIREBASE_TOKEN }}"
          echo "✅ Firestore indexes deployed successfully"
      # ================================================================
      # STEP 2: Set up Java 17
      # ================================================================
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      # ================================================================
      # STEP 3: Set up Flutter
      # ================================================================
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      # ================================================================
      # STEP 4: Clean old artifacts
      # ================================================================
      - name: Clean old build artifacts
        run: |
          set -euo pipefail
          rm -rf build/ .dart_tool/ android/.gradle/ android/app/build/ || true
          echo "✅ Clean complete"
      # ================================================================
      # STEP 5: Setup asset directories
      # ================================================================
      - name: Setup asset directories
        run: |
          set -euo pipefail
          mkdir -p assets
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          if [ ! -f android/app/src/main/res/drawable/launch_background.xml ]; then
            cat > android/app/src/main/res/drawable/launch_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@android:color/white" />
          </layer-list>
          EOF
          fi
          echo "✅ Asset directories ready"
      # ================================================================
      # STEP 6: Download icon assets from Google Drive
      # ================================================================
      - name: Download icon assets
        run: |
          set -euo pipefail
          GDRIVE_FILE_ID="1zJ3CQ8PrTaYs5Z4feJV2D6PL3t4CK3vx"
          OUTPUT="assets/icon.png"
          curl -L \
            "https://drive.google.com/uc?export=download&id=${GDRIVE_FILE_ID}" \
            -o "$OUTPUT"
          if [ ! -f "$OUTPUT" ]; then
            echo "❌ Icon download failed!"
            exit 1
          fi
          cp "$OUTPUT" assets/icon_foreground.png
          echo "✅ Icon downloaded successfully"
      # ================================================================
      # STEP 7: Flutter pub get
      # ================================================================
      - name: Flutter pub get
        run: |
          flutter pub get
          echo "✅ Flutter dependencies installed"
      # ================================================================
      # STEP 8: Generate launcher icons
      # ================================================================
      - name: Generate launcher icons
        run: |
          set -euo pipefail
          dart run flutter_launcher_icons
          echo "✅ All launcher icons generated"
      # ================================================================
      # STEP 9: Verify Firebase config
      # ================================================================
      - name: Verify google-services.json
        run: |
          if [ ! -f android/app/google-services.json ]; then
            echo "❌ FATAL: google-services.json missing!"
            exit 1
          fi
          echo "✅ google-services.json found"
      # ================================================================
      # STEP 10: Decode Keystore
      # ================================================================
      - name: Decode keystore
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "❌ FATAL: KEYSTORE_BASE64 secret is empty!"
            exit 1
          fi
          mkdir -p "$(dirname "$KEYSTORE_PATH")"
          rm -f "$KEYSTORE_PATH"
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$KEYSTORE_PATH"
          echo "✅ Keystore decoded to $KEYSTORE_PATH"
      # ================================================================
      # STEP 11: Verify Keystore & Password Integrity
      # ================================================================
      - name: Verify keystore integrity
        run: |
          set -euo pipefail
          keytool -list \
            -keystore "$KEYSTORE_PATH" \
            -storepass "${{ secrets.KEY_STORE_PASSWORD }}" > /dev/null
          keytool -list -v \
            -keystore "$KEYSTORE_PATH" \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -storepass "${{ secrets.KEY_STORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" > /dev/null
          echo "✅ Keystore and all passwords verified!"
      # ================================================================
      # STEP 12: Create key.properties
      # ================================================================
      - name: Create key.properties
        run: |
          set -euo pipefail
          cat > android/key.properties << EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
          echo "✅ key.properties created"
          echo "--- Contents ---"
          cat android/key.properties
          echo "--- Keystore file check ---"
          ls -la android/app/upload-keystore.jks && echo "✅ Keystore file exists!"
      # ================================================================
      # STEP 13: Build Release APK
      # ================================================================
      - name: Build Release APK
        run: |
          set -euo pipefail
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --no-tree-shake-icons
          echo "✅ Release APK built successfully"
      # ================================================================
      # STEP 14: Rename APK with version + timestamp
      # ================================================================
      - name: Rename APK
        run: |
          set -euo pipefail
          # Extract version from pubspec.yaml e.g. "1.0.0+4"
          VERSION=$(grep '^version:' pubspec.yaml \
            | sed 's/version: //' \
            | tr -d '[:space:]')
          # Sanitize version — replace + with - for tag safety
          VERSION_SAFE=$(echo "$VERSION" | tr '+' '-')
          # Build timestamp
          TIMESTAMP=$(date -u +'%Y%m%d-%H%M')
          APK_NAME="phlakes-fabrics-v${VERSION_SAFE}-${TIMESTAMP}.apk"
          mv build/app/outputs/flutter-apk/app-release.apk \
             "build/app/outputs/flutter-apk/${APK_NAME}"
          # Export to env for later steps
          echo "APK_NAME=${APK_NAME}" >> "$GITHUB_ENV"
          echo "APP_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "APP_VERSION_SAFE=${VERSION_SAFE}" >> "$GITHUB_ENV"
          echo "BUILD_TIMESTAMP=${TIMESTAMP}" >> "$GITHUB_ENV"
          echo "✅ APK renamed to: ${APK_NAME}"
      # ================================================================
      # STEP 15: Upload APK as workflow artifact
      # ================================================================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: phlakes-fabrics-apk-${{ env.BUILD_TIMESTAMP }}
          path: build/app/outputs/flutter-apk/${{ env.APK_NAME }}
          retention-days: 30
          if-no-files-found: error
      # ================================================================
      # STEP 16: Generate release tag
      # ================================================================
      - name: Generate release tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          TAG="v${{ env.APP_VERSION_SAFE }}-${{ env.BUILD_TIMESTAMP }}"
          echo "RELEASE_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "✅ Release tag: ${TAG}"
      # ================================================================
      # STEP 17: Create GitHub Release
      # ================================================================
      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Phlakes Fabrics ${{ env.RELEASE_TAG }}"
          body: |
            ## 🟡 Phlakes Fabrics — Release ${{ env.RELEASE_TAG }}
            **Version:** `${{ env.APP_VERSION }}`
            **Built:** `${{ env.BUILD_TIMESTAMP }} UTC`
            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            ---
            ### 📲 How to Install
            1. Download **`${{ env.APK_NAME }}`** below
            2. Transfer to your Android device
            3. Enable **Install from Unknown Sources** in Settings → Security
            4. Open the APK file to install
            ---
            ### ✅ Build Info

| Property | Value |
| :--- | :--- |
| Flutter channel | `stable` |
| Java version | `17` |
| Signed | `release keystore ✅` |
| Obfuscated | `yes` |
| Build system | `GitHub Actions` |

            ---
            > Built automatically on push to `main`
          files: build/app/outputs/flutter-apk/${{ env.APK_NAME }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # ================================================================
      # STEP 18: Print build summary
      # ================================================================
      - name: Print build summary
        if: always()
        run: |
          echo "=============================================="
          echo "  PHLAKES FABRICS — BUILD SUMMARY"
          echo "=============================================="
          echo "  APK Name   : ${{ env.APK_NAME }}"
          echo "  Version    : ${{ env.APP_VERSION }}"
          echo "  Timestamp  : ${{ env.BUILD_TIMESTAMP }}"
          echo "  Event      : ${{ github.event_name }}"
          echo "  Branch     : ${{ github.ref_name }}"
          echo "  Commit     : ${{ github.sha }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "  Release    : https://github.com/${{ github.repository }}/releases/tag/${{ env.RELEASE_TAG }}"
          fi
          echo "=============================================="